<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Options P&L Calculator</title>
<style>
  :root{
    --bg:#f5efe3; --panel:#fffaf0; --panel2:#f0e8d8; --line:#e0d5c0;
    --text:#3a3226; --dim:#9a8d78; --sell:#c85a3c; --buy:#2e9e78;
    --accent:#c99a4e; --ce:#2e7ec8; --pe:#b8642e;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{overflow-x:hidden}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    padding:14px 12px calc(20px + env(safe-area-inset-bottom));
    max-width:640px;margin-inline:auto;-webkit-text-size-adjust:100%;
  }
  h1{font-size:19px;font-weight:700;margin:2px 0 12px;letter-spacing:-.3px}
  .lotrow{
    display:flex;align-items:center;gap:10px;background:var(--panel);
    border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:14px;
    box-shadow:0 1px 2px #0000000a;
  }
  .lotrow label{font-size:13px;color:var(--dim);flex:1;font-weight:600}
  .lotrow input{width:84px;flex-shrink:0}
  .clearbtn{
    background:var(--panel2);border:1px solid var(--line);color:var(--dim);
    font-size:11px;font-weight:600;padding:9px 12px;border-radius:9px;cursor:pointer;flex-shrink:0;
  }
  .clearbtn:active{background:var(--line)}

  .leg{
    background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:13px;margin-bottom:11px;box-shadow:0 1px 2px #0000000a;
  }
  .leg.b{border-left:4px solid var(--buy)}
  .leg.s{border-left:4px solid var(--sell)}
  .leghead{display:flex;align-items:center;gap:9px;margin-bottom:11px}
  .toggle{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;flex-shrink:0}
  .toggle button{
    background:var(--panel2);color:var(--dim);border:none;padding:9px 13px;
    font-size:12.5px;font-weight:700;cursor:pointer;min-width:46px;
  }
  .toggle button.on-b{background:var(--buy);color:#fff}
  .toggle button.on-s{background:var(--sell);color:#fff}
  .strikewrap{flex:1;min-width:0;position:relative}
  .strikewrap input{width:100%;text-align:center;font-weight:700;padding-right:38px}
  .tag{
    position:absolute;right:7px;top:50%;transform:translateY(-50%);
    font-size:10px;font-weight:800;letter-spacing:.5px;padding:2px 6px;border-radius:6px;
    color:#fff;display:none;pointer-events:none;
  }
  .tag.ce{display:inline-block;background:var(--ce)}
  .tag.pe{display:inline-block;background:var(--pe)}
  .legpl{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;min-width:76px;text-align:right;flex-shrink:0}

  .fields{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .fld label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px;font-weight:700}
  input{
    background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:12px 11px;font-size:16px;font-variant-numeric:tabular-nums;
    outline:none;transition:border-color .15s;width:100%;
  }
  input:focus{border-color:var(--accent);background:var(--panel)}
  input::placeholder{color:#c3b6a0}

  .total{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:16px;margin-top:6px;display:flex;justify-content:space-between;align-items:center;
    box-shadow:0 1px 3px #0000000f;
  }
  .total .lbl{font-size:15px;font-weight:700}
  .total .v{font-size:27px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
  .pos{color:var(--buy)} .neg{color:var(--sell)} .zero{color:var(--dim)}
  .hint{font-size:11px;color:var(--dim);margin-top:11px;line-height:1.5}
</style>
</head>
<body>
  <h1>Options P&amp;L Calculator</h1>

  <div class="lotrow">
    <label>Lot size</label>
    <input id="lot" type="number" inputmode="decimal" value="65">
    <button class="clearbtn" onclick="clearAll()">Clear all</button>
  </div>

  <div id="legs"></div>

  <div class="total">
    <span class="lbl">Overall P&amp;L</span>
    <span class="v zero" id="totalpl">₹0</span>
  </div>
  <div class="hint">Type strike like <b>25000 CE</b> or <b>24800 PE</b>. P&amp;L = (exit − entry) × lot × direction. Buy profits when price rises, Sell when it falls.</div>

<script>
  const F = new Intl.NumberFormat('en-IN',{maximumFractionDigits:2});
  const money = n => (n<0?'-₹':'₹') + F.format(Math.abs(n));
  const tagOf = v => { const u=(v||'').toUpperCase(); if(u.includes('CE'))return'ce'; if(u.includes('PE'))return'pe'; return ''; };

  const legDefs = [{dir:'s'},{dir:'s'},{dir:'b'},{dir:'b'}];
  const state = legDefs.map(l => ({dir:l.dir, strike:'', entry:'', exit:''}));

  function render(){
    document.getElementById('legs').innerHTML = state.map((s,i)=>`
      <div class="leg ${s.dir}">
        <div class="leghead">
          <div class="toggle">
            <button class="${s.dir==='b'?'on-b':''}" onclick="setDir(${i},'b')">Buy</button>
            <button class="${s.dir==='s'?'on-s':''}" onclick="setDir(${i},'s')">Sell</button>
          </div>
          <div class="strikewrap">
            <input type="text" inputmode="text" autocapitalize="characters" placeholder="Strike + CE/PE" value="${s.strike}" oninput="upd(${i},'strike',this.value)">
            <span class="tag ${tagOf(s.strike)}" id="tag${i}">${tagOf(s.strike).toUpperCase()}</span>
          </div>
          <div class="legpl zero" id="pl${i}">₹0</div>
        </div>
        <div class="fields">
          <div class="fld"><label>Entry price</label>
            <input type="number" inputmode="decimal" placeholder="0" value="${s.entry}" oninput="upd(${i},'entry',this.value)"></div>
          <div class="fld"><label>Exit price</label>
            <input type="number" inputmode="decimal" placeholder="0" value="${s.exit}" oninput="upd(${i},'exit',this.value)"></div>
        </div>
      </div>`).join('');
  }

  function updTag(i){
    const t=document.getElementById('tag'+i);
    const cls=tagOf(state[i].strike);
    t.className='tag '+cls; t.textContent=cls.toUpperCase();
  }

  function calc(){
    const lot = parseFloat(document.getElementById('lot').value)||0;
    let total = 0;
    state.forEach((s,i)=>{
      const entry=parseFloat(s.entry), exit=parseFloat(s.exit);
      const el=document.getElementById('pl'+i);
      if(isNaN(entry)||isNaN(exit)){ el.textContent='₹0'; el.className='legpl zero'; return; }
      const sign = s.dir==='b' ? 1 : -1;
      const pl = (exit-entry)*lot*sign;
      total += pl;
      el.textContent = money(pl);
      el.className = 'legpl '+(pl>0?'pos':pl<0?'neg':'zero');
    });
    const t=document.getElementById('totalpl');
    t.textContent = money(total);
    t.className = 'v '+(total>0?'pos':total<0?'neg':'zero');
  }

  window.setDir=(i,d)=>{ state[i].dir=d; render(); calc(); };
  window.upd=(i,k,v)=>{ state[i][k]=v; if(k==='strike')updTag(i); calc(); };
  window.clearAll=()=>{ state.forEach(s=>{s.strike='';s.entry='';s.exit='';}); render(); calc(); };
  document.getElementById('lot').addEventListener('input',calc);

  render(); calc();
</script>
</body>
</html>
